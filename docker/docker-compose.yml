services:

  hub-banking-platform:
    image: postgres:15
    container_name: hub-banking-platform
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hub-banking-platform}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-hub-banking-platform}
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    networks:
      - hub-banking-platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hub-banking-platform"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  fast_api-hub-banking-platform-backend:
    container_name: fast_api_hub_banking_platform_backend
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      hub-banking-platform:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      # Host fixo = nome do serviço PostgreSQL na rede Docker (não usar localhost!)
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@hub-banking-platform:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hub-banking-platform}
      DEBUG: "${DEBUG:-true}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
    volumes:
      - .:/app
      - ./migrations:/src/migrations  # usa migrations do host (schema hub-banking-platform)
    networks:
      - hub-banking-platform-net
    command: uvicorn src.main:app --host 0.0.0.0 --port ${API_PORT:-8000}


volumes:
  database_data:

networks:
  hub-banking-platform-net:
    driver: bridge
