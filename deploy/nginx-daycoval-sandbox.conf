server {
    listen 8080;
    listen [::]:8080;
    server_name 31.97.165.27;

    resolver 127.0.0.53 ipv6=off valid=30s;
    set $daycoval_upstream "apigwsandbox.daycoval.com.br";

    location / {
        proxy_pass https://$daycoval_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name apigwsandbox.daycoval.com.br;
        proxy_ssl_verify off;

        proxy_set_header Host apigwsandbox.daycoval.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
