[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[alembic]
script_location = migrations
# echo = true   # Descomente para ver o SQL executado durante as migrações (debug)
# echo = true   # Descomente para ver o SQL das migrações (debug)
# echo = true   # Descomente para ver o SQL executado nas migrações (debug)
# echo = true   # Descomente para ver o SQL executado durante migrações (debug)
